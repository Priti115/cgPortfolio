<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .box {
            width: 340px;
        }
    </style>
</head>
<body>

<form class="reg_box" onsubmit="return check()">

    <div style="text-align:center; font-size:28px; font-family:Arial; font-weight:bold; margin-bottom:15px;">
        <span style="color:#f39c12;">CG</span>
        <span style="color:#001F46;">Infinity</span>
    </div>

    <input type="text" id="uname" placeholder="Username (no space)" required>

    <input type="tel" placeholder="Phone Number" required>

    <input type="email" placeholder="Email" required>

    <input type="text" placeholder="Designation" required>

    <input type="date" required>

    <select required>
        <option value="">Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <input type="number" placeholder="Experience" required>

    <input type="password" id="p1" placeholder="Password" required>

    <input type="password" id="p2" placeholder="Confirm Password" required>

    <button type="submit">Register</button>
    <button type="reset">Reset</button>

    <p>Already user? <a href="login.html">Login</a></p>

</form>

<script>
function check() {
    var u = document.getElementById("uname").value;
    var p1 = document.getElementById("p1").value;
    var p2 = document.getElementById("p2").value;

    if (u.includes(" ")) {
        alert("Username should not contain space");
        return false;
    }

    if (p1 !== p2) {
        alert("Password does not match");
        return false;
    }

    alert("Registration Successful");
    window.location.href = "login.html";
    return false;
}
</script>

</body>
</html>
