<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="main-container">

<!-- Navbar -->
<div class="navbar-custom d-flex justify-content-between align-items-center">

    <div style="font-size:24px; font-weight:bold;">
        <span style="color:#f39c12;">CG</span>
        <span style="color:#001F46;">Infinity</span>
    </div>

    <div>
        <a href="about.html">About</a>
        <a href="contact.html">Contact Us</a>
        <a href="login.html" class="btn">Login</a>
    </div>

</div>

<form class="reg_box" onsubmit="return check()">

    <div style="text-align:center; font-size:28px; font-family:Arial; font-weight:bold; margin-bottom:20px;">
        <span style="color:#f39c12;">CG</span>
        <span style="color:#001F46;">Infinity</span>
    </div>

    <input style = "margin-bottom:20px;" type="text" id="uname" placeholder="Username (no space)" required>

    <input style = "margin-bottom:20px;" type="tel" placeholder="Phone Number" required>

    <input style = "margin-bottom:20px;" type="email" placeholder="Email" required>

    <input style = "margin-bottom:20px;" type="text" placeholder="Designation" required>

    <input style = "margin-bottom:20px;" style = "margin-bottom:20px;" type="date" required>

    <select required style = "margin-bottom:20px;">
        <option value="">Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <input style = "margin-bottom:20px;" type="number" placeholder="Experience" required>

    <input style = "margin-bottom:20px;" type="password" id="p1" placeholder="Password" required>

    <input style = "margin-bottom:20px;" type="password" id="p2" placeholder="Confirm Password" required>

    <button  style = "margin-bottom:20px;" type="submit">Register</button>
    <button  style = "margin-bottom:20px;" type="reset">Reset</button>

    <p>Already user? <a href="login.html">Login</a></p>

</form>


<!-- Footer -->
<div class="footer">
    CG Infinity © 2026
</div>

</div>

<script>
function check() {
    var u = document.getElementById("uname").value;
    var p1 = document.getElementById("p1").value;
    var p2 = document.getElementById("p2").value;

    if (u.includes(" ")) {
        alert("Username should not contain space");
        return false;
    }

    if (p1 !== p2) {
        alert("Password does not match");
        return false;
    }

    alert("Registration Successful");
    window.location.href = "login.html";
    return false;
}
</script>

</body>
</html>
