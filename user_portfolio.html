<!DOCTYPE html>
<html>
<head>
<title>User Portfolio</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body>

<div class="main-container">

<!-- Navbar -->
<div class="navbar-custom d-flex justify-content-between align-items-center">

    <div style="font-size:24px; font-weight:bold;">
        <span style="color:#f39c12;">CG</span>
        <span style="color:#001F46;">Infinity</span>
    </div>

    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact Us</a>
    </div>

</div>


<div class="content container">

    <div class="profile-box">

        <img src="https://randomuser.me/api/portraits/women/50.jpg" class="profile-img">

        <div class="user-info">
            <p>Email: user@gmail.com</p>
            <p>Contact: ******3210</p>
            <button onclick="logout()">Logout</button>
        </div>

    </div>


    <div class="tab-buttons">
        <button onclick="showTab('personal')">Personal Information</button>
        <button onclick="showTab('contact')">Contact Info</button>
        <button onclick="showTab('skills')">Technical Skills</button>
    </div>


    <div id="personal" class="tab-content">
        <p>Name: Priti</p>
        <p>Designation: Intern</p>
        <p>Experience: 1 Year</p>
    </div>

    <div id="contact" class="tab-content" style="display:none;">
        <p>Email: user@gmail.com</p>
        <p>Phone: 9876543210</p>
        <p>Address: Ghaziabad</p>
    </div>

    <div id="skills" class="tab-content" style="display:none;">
        <p>HTML</p>
        <p>CSS</p>
        <p>JavaScript</p>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    CG Infinity © 2026
</div>

</div>

<script>
function showTab(tab) {

    document.getElementById("personal").style.display = "none";
    document.getElementById("contact").style.display = "none";
    document.getElementById("skills").style.display = "none";

    document.getElementById(tab).style.display = "block";
}

function logout() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
